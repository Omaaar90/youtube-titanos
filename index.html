<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>YouTube for TitanOS</title><style>/* Prevent flash of unstyled content */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f0f0f;
        color: #fff;
        font-family: 'YouTube Noto', Roboto, Arial, sans-serif;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        z-index: 10000;
        background: #0f0f0f;
      }
      #loading-screen .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top-color: #ff0000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loading-screen p {
        font-size: 18px;
        opacity: 0.7;
      }</style><script src="index.js"></script></head><body><div id="loading-screen"><div class="spinner"></div><p>Loading YouTube…</p></div></body></html>

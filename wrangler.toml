name = "youtube-titanos"
main = "tools/cloudflare-worker.js"
compatibility_date = "2024-01-01"

# ── Observability ──────────────────────────────────────────────────────────────
# Disabled invocation_logs to avoid inflating request/event counts on free plan.
# Re-enable temporarily for debugging by setting invocation_logs = true
# and head_sampling_rate = 0.1 (10% sampling).
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false  # disabled: was causing ~165k extra events/day
head_sampling_rate = 0.01  # 1% sampling - only errors/exceptions will be captured

# ── KV Session Cache (optional) ───────────────────────────────────────────────
# Uncomment and fill in your KV namespace ID to enable session cookie caching.
# [[kv_namespaces]]
# binding = "YT_SESSION"
# id = "<YOUR_KV_NAMESPACE_ID>"
